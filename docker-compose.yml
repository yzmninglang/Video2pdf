version: "3.9"

services:
  video2pdf:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    image: video2pdf-batch:latest
    container_name: video2pdf-batch
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    ports:
      - "${HOST_PORT:-7860}:7860"
    volumes:
      - ./example:/data
      - ${STATE_DIR:-./state_data}:/state
    restart: unless-stopped
    environment:
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    command:
      - "--server-name"
      - "0.0.0.0"
      - "--server-port"
      - "7860"
      - "--mapped-dir"
      - "/data"
      - "--state-dir"
      - "/state"
